<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OLS — Menu</title>
<meta name="description" content="OLS — أكل نظيف وطعم مختلف">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bk:#000;--wh:#FFF;--ch:#2A2625;--dg:#005240;--sg:#C8D796;--cr:#F5F3EE;--wg:#E8E4DC;--ls:#E8EDD4;--fa:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif;--fe:'IBM Plex Sans','IBM Plex Sans Arabic',sans-serif;--fm:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--cr);color:var(--ch);font-family:var(--fa);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body[dir="ltr"]{font-family:var(--fe)}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.hdr{position:sticky;top:0;z-index:100;background:var(--bk);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center}.logo img{height:38px;width:auto;filter:brightness(0) invert(1)}
.hdr-r{display:flex;gap:8px;align-items:center}
.lbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--wh);padding:7px 16px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;font-family:var(--fe)}.lbtn:hover{background:rgba(255,255,255,.14)}
.abtn{background:none;border:none;color:rgba(255,255,255,.25);font-size:18px;cursor:pointer;padding:4px 8px}.abtn:hover{color:var(--sg)}
.hero{background:var(--bk);padding:32px 20px 48px;text-align:center;position:relative}.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:36px;background:var(--cr);border-radius:36px 36px 0 0}
.hero-l{font-size:11px;font-weight:500;color:var(--sg);letter-spacing:5px;text-transform:uppercase;margin-bottom:10px;font-family:var(--fe)}
.hero-t{font-size:26px;font-weight:300;color:var(--wh);line-height:1.45;max-width:300px;margin:0 auto}body[dir="ltr"] .hero-t{font-family:var(--fe)}
.tw{position:sticky;top:56px;z-index:90;background:var(--cr);padding:14px 0 0}.ts{display:flex;gap:8px;overflow-x:auto;padding:0 20px 14px;scrollbar-width:none}.ts::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:9px 20px;border-radius:100px;border:1.5px solid rgba(42,38,37,.2);background:transparent;color:var(--ch);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .25s;font-family:inherit;white-space:nowrap}
.tb.on{background:var(--dg);border-color:var(--dg);color:var(--wh)}.tb:not(.on):hover{background:var(--ch);color:var(--wh)}
.tl{height:1px;background:rgba(42,38,37,.08);margin:0 20px}
.ms{padding:24px 16px 0;position:relative;z-index:1}.sl{font-size:14px;font-weight:700;letter-spacing:1px;color:var(--dg);margin-bottom:16px;padding:0 4px;font-family:var(--fa)}
.mg{display:grid;grid-template-columns:1fr;gap:14px}
.mc{background:var(--wh);border-radius:22px;overflow:hidden;cursor:pointer;transition:transform .3s;border:1px solid rgba(42,38,37,.04);animation:fu .5s both}.mc:nth-child(1){animation-delay:.04s}.mc:nth-child(2){animation-delay:.08s}.mc:nth-child(3){animation-delay:.12s}.mc:nth-child(4){animation-delay:.16s}.mc:nth-child(5){animation-delay:.2s}.mc:nth-child(6){animation-delay:.24s}
.mc:active{transform:scale(.97)}
.cw{position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;background:var(--wg)}.ci{width:100%;height:100%;object-fit:cover;transition:transform .5s}.mc:hover .ci{transform:scale(1.04)}
.ck{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;font-family:var(--fe);backdrop-filter:blur(8px)}body[dir="ltr"] .ck{left:auto;right:10px}
.ck.grill{background:rgba(0,82,64,.85);color:var(--wh)}.ck.fry{background:rgba(200,215,150,.9);color:#3a4a10}
.cb{padding:14px 16px 16px}.cn{font-size:16px;font-weight:600;color:var(--ch);line-height:1.3;margin-bottom:2px}
.cs{font-size:12.5px;color:rgba(42,38,37,.4);font-family:var(--fe)}body[dir="ltr"] .cs{font-family:var(--fa)}
.cd{font-size:12.5px;line-height:1.55;color:rgba(42,38,37,.55);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cf{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(42,38,37,.05)}
.ca{display:flex;gap:4px}.ad{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--cr);position:relative}
.ad[data-t]:hover::after{content:attr(data-t);position:absolute;bottom:115%;left:50%;transform:translateX(-50%);background:var(--ch);color:var(--wh);padding:3px 10px;border-radius:8px;font-size:10.5px;white-space:nowrap;z-index:5}
.cp{font-family:var(--fe);font-size:18px;font-weight:700;color:var(--dg);white-space:nowrap}.cp small{font-size:11px;font-weight:400;color:rgba(42,38,37,.35)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}.mbg.on{opacity:1;pointer-events:all}
.msh{position:fixed;bottom:0;left:0;right:0;background:var(--wh);border-radius:28px 28px 0 0;z-index:201;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;overscroll-behavior:contain}.msh.on{transform:translateY(0)}
.mha{width:38px;height:4px;border-radius:2px;background:rgba(42,38,37,.12);margin:12px auto 0}
.mx{position:absolute;top:14px;left:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--ch);z-index:5}body[dir="ltr"] .mx{left:auto;right:14px}
.miw{width:100%;aspect-ratio:16/10;overflow:hidden;background:var(--wg);border-radius:0 0 24px 24px}.mii{width:100%;height:100%;object-fit:cover}
.mob{padding:20px 20px 32px}
.mck{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;font-family:var(--fe);padding:4px 10px;border-radius:8px;margin-bottom:10px}.mck.grill{background:rgba(0,82,64,.08);color:var(--dg)}.mck.fry{background:rgba(200,215,150,.3);color:#5a6a1a}
.mn{font-size:24px;font-weight:700;color:var(--ch);line-height:1.3}.msu{font-size:14px;color:rgba(42,38,37,.4);margin-top:3px;font-family:var(--fe)}body[dir="ltr"] .msu{font-family:var(--fa)}
.mde{font-size:14px;line-height:1.7;color:rgba(42,38,37,.6);margin-top:12px}
.mpr{display:flex;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid rgba(42,38,37,.06)}.mp{font-family:var(--fe);font-size:28px;font-weight:700;color:var(--dg)}.mp small{font-size:13px;font-weight:400;color:rgba(42,38,37,.35)}
.st{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--dg);margin:24px 0 12px;font-family:var(--fe)}
.nug{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nub{background:var(--cr);border-radius:14px;padding:14px 8px;text-align:center}.nuv{font-family:var(--fe);font-size:21px;font-weight:700;color:var(--ch);line-height:1}.nuu{font-size:10px;color:rgba(42,38,37,.35);font-family:var(--fe)}.nul{font-size:10.5px;color:rgba(42,38,37,.45);margin-top:5px;font-weight:500}
.al{display:flex;flex-wrap:wrap;gap:8px}.ab{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--cr);border-radius:100px;font-size:13px;font-weight:500}
.ic{display:flex;flex-wrap:wrap;gap:6px}.ip{padding:6px 14px;background:rgba(0,82,64,.05);border-radius:100px;font-size:12.5px;color:var(--dg);font-weight:500}
.ft{background:var(--bk);padding:40px 20px;text-align:center;position:relative;z-index:1;margin-top:40px}.ft::before{content:'';position:absolute;top:-1px;left:0;right:0;height:36px;background:var(--cr);border-radius:0 0 36px 36px}
.ftl{display:flex;justify-content:center}.ftl img{height:38px;filter:brightness(0) invert(1)}.fts{font-size:10px;color:rgba(255,255,255,.35);margin-top:4px;letter-spacing:3px;text-transform:uppercase;font-family:var(--fe)}
.ftk{display:flex;gap:20px;justify-content:center;margin-top:20px}.ftk a{color:var(--sg);text-decoration:none;font-size:13px;font-weight:500;font-family:var(--fe)}.ftc{font-size:11px;color:rgba(255,255,255,.2);margin-top:20px;font-family:var(--fe)}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:480px){.mg{grid-template-columns:repeat(2,1fr)}}
@media(min-width:768px){.mg{grid-template-columns:repeat(2,1fr);gap:16px}.ms{max-width:720px;margin:0 auto}.ts{justify-content:center}.msh{max-width:480px;left:50%;transform:translateX(-50%) translateY(100%)}.msh.on{transform:translateX(-50%) translateY(0)}}
@media(min-width:1024px){.mg{grid-template-columns:repeat(3,1fr)}.ms{max-width:1000px}}

/* ADMIN */
.apx{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:500;display:none;overflow-y:auto}.apx.on{display:block}
.ap{max-width:500px;margin:0 auto;padding:20px;min-height:100vh}
.aph{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:16px}
.apt{color:var(--wh);font-size:18px;font-weight:700}.apclose{background:none;border:none;color:rgba(255,255,255,.4);font-size:22px;cursor:pointer}
.aplogin{text-align:center;padding:80px 20px}
.aplogin input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--wh);padding:14px 20px;border-radius:14px;font-size:20px;text-align:center;width:200px;letter-spacing:8px;font-family:var(--fm);outline:none}
.aplogin input:focus{border-color:var(--sg)}.aplogin button{display:block;margin:16px auto 0;background:var(--dg);color:var(--wh);border:none;padding:12px 40px;border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.aperr{color:#f66;font-size:13px;margin-top:10px}
/* Admin tabs */
.atabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,.04);border-radius:12px;padding:3px}
.atab{flex:1;padding:9px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:rgba(255,255,255,.35);transition:.15s}
.atab.on{background:var(--dg);color:var(--wh)}
.asec{display:none}.asec.on{display:block}
.apc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px;margin-bottom:10px}
.apc.hid{opacity:.45;border-style:dashed}
.apc-h{display:flex;align-items:center;gap:12px}.apc-img{width:52px;height:52px;border-radius:12px;object-fit:cover;background:rgba(255,255,255,.08)}
.apc-n{color:var(--wh);font-size:14px;font-weight:600;flex:1;min-width:0}.apc-en{color:rgba(255,255,255,.3);font-size:11px;font-family:var(--fe)}
.apc-p{color:var(--sg);font-family:var(--fe);font-weight:700;font-size:15px}
.apc-f{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.apb{padding:7px 14px;border-radius:10px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.apb-e{background:rgba(200,215,150,.12);color:var(--sg)}.apb-h{background:rgba(245,158,11,.1);color:#fb3}.apb-s{background:rgba(80,255,80,.08);color:#8f8}
.apb-d{background:rgba(239,68,68,.1);color:#f66}
.apb-add{background:var(--dg);color:var(--wh);width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.av{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;margin-left:6px}.av.y{background:rgba(80,255,80,.08);color:#8f8}.av.n{background:rgba(255,80,80,.08);color:#f88}
.ahid-info{font-size:9px;color:#fb3;margin-top:4px}
/* Category cards */
.catc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.catc-n{color:var(--wh);font-size:14px;font-weight:600}.catc-ct{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
.catc-a{display:flex;gap:6px}
.catc-a button{padding:6px 10px;border-radius:8px;border:none;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.catc-ren{background:rgba(200,215,150,.12);color:var(--sg)}.catc-del{background:rgba(239,68,68,.1);color:#f66}
.cat-add-row{display:flex;gap:8px;margin-bottom:16px}
.cat-add-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--wh);padding:10px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none}
.cat-add-row input:focus{border-color:var(--sg)}
.cat-add-row button{background:var(--dg);color:var(--wh);border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
/* ImgBB upload */
.img-up{border:2px dashed rgba(255,255,255,.12);border-radius:14px;padding:18px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:.15s;margin-top:4px}
.img-up:hover{border-color:var(--sg)}
.img-up.has{border-style:solid;padding:0}
.img-up img{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:12px;display:none}
.img-up img.on{display:block}
.img-up .iph{color:rgba(255,255,255,.3);font-size:11px}.img-up .iph .ico{font-size:22px;margin-bottom:4px}
.img-up input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-up .uping{position:absolute;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;color:var(--sg);font-size:12px;font-weight:600;border-radius:12px}
.img-up .uping.on{display:flex}

/* EDIT */
.emx{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:none;overflow-y:auto}.emx.on{display:block}
.em{max-width:500px;margin:20px auto;padding:20px;background:#1a1a1a;border-radius:20px;border:1px solid rgba(255,255,255,.06)}
.emt{color:var(--wh);font-size:17px;font-weight:700;margin-bottom:16px}
.er{margin-bottom:10px}.el{color:rgba(255,255,255,.4);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;font-family:var(--fe)}
.ei{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--wh);padding:10px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none}.ei:focus{border-color:var(--sg)}
textarea.ei{min-height:55px;resize:vertical}
.er2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.er4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.emsave{background:var(--dg);color:var(--wh);border:none;padding:14px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:14px;font-family:inherit}
.emcancel{background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);border:none;padding:12px;border-radius:14px;font-size:14px;cursor:pointer;width:100%;margin-top:8px;font-family:inherit}
.eal{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.ealb{padding:5px 11px;border-radius:100px;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;font-family:inherit}.ealb.on{background:rgba(200,215,150,.15);border-color:var(--sg);color:var(--sg)}
/* Confirm dialog */
.cfm-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:700;display:none;align-items:center;justify-content:center;padding:20px}.cfm-bg.on{display:flex}
.cfm-box{background:#1a1a1a;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px 18px;width:100%;max-width:340px;text-align:center}
.cfm-box h3{color:var(--wh);font-size:16px;margin-bottom:6px}.cfm-box p{font-size:12px;color:rgba(255,255,255,.4);line-height:1.5;margin-bottom:14px}
.cfm-btns{display:flex;gap:8px}.cfm-btns button{flex:1;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cfm-y{background:rgba(239,68,68,.15);color:#f66}.cfm-n{background:rgba(255,255,255,.05);color:rgba(255,255,255,.4)}
</style>
</head>
<body dir="rtl">
<header class="hdr">
  <div class="logo"><img src="/ols-logo.png" alt="OLS"></div>
  <div class="hdr-r"><button class="lbtn" onclick="tgLang()">English</button><button class="abtn" onclick="openAP()">⚙</button></div>
</header>
<section class="hero"><div class="hero-l">MENU</div><h1 class="hero-t" id="ht">أكل نظيف وطعم مختلف</h1></section>
<nav class="tw"><div class="ts" id="tabs"></div><div class="tl"></div></nav>
<main id="grid"></main>
<div class="mbg" id="mbg" onclick="cM()"></div>
<div class="msh" id="msh"><div class="mha"></div><button class="mx" onclick="cM()">✕</button><div id="mbody"></div></div>
<footer class="ft"><div class="ftl"><img src="/ols-logo.png" alt="OLS"></div><div class="fts">أكل نظيف وطعم مختلف</div><div class="ftk"><a href="https://www.instagram.com/olsyes/" target="_blank">Instagram</a><a href="https://share.google/WuZBnUt12gPBpYM0S" target="_blank">Location</a></div><div class="ftc">© OLS 2025 — Developed by Mohammed Al-Hasoon</div></footer>
<div class="apx" id="apx"><div class="ap" id="apc"></div></div>
<div class="emx" id="emx"><div class="em" id="emc"></div></div>
<div class="cfm-bg" id="cfmBg"><div class="cfm-box"><h3 id="cfmT"></h3><p id="cfmM"></p><div class="cfm-btns"><button class="cfm-y" id="cfmY">تأكيد</button><button class="cfm-n" onclick="closeCfm()">إلغاء</button></div></div></div>
<script>
let L='ar',PIN=null,cats=[],alMap={},items=[],raw=[];
const API='/api/menu';
function T(o){return o?L==='ar'?o.ar:o.en:''}
function M(i){return{id:i.id,cat:i.category,cook:i.cookType,img:i.image,ar:{name:i.name.ar,desc:i.description.ar},en:{name:i.name.en,desc:i.description.en},price:i.price,pl:i.priceLabel,al:i.allergens||[],ing:i.ingredients||{ar:[],en:[]},mac:i.macros||{cal:0,protein:0,carbs:0,fat:0},avail:i.available!==false}}

async function load(){
  try{const r=await fetch(API);const d=await r.json();cats=[{id:'all',ar:'الكل',en:'All'},...d.categories];alMap=d.allergens||{};items=d.items.sort((a,b)=>(a.order||0)-(b.order||0)).map(M);rTabs();rMenu()}
  catch(e){document.getElementById('grid').innerHTML='<div style="text-align:center;padding:60px 20px;color:rgba(42,38,37,.4)">جاري التحميل...</div>'}
}

function rTabs(){document.getElementById('tabs').innerHTML=cats.map(c=>`<button class="tb${c.id==='all'?' on':''}" data-c="${c.id}" onclick="fC('${c.id}')">${T(c)}</button>`).join('')}

function rMenu(f='all'){
  const fl=f==='all'?items:items.filter(i=>i.cat===f);const g={};fl.forEach(i=>{(g[i.cat]=g[i.cat]||[]).push(i)});
  let h='';cats.filter(c=>c.id!=='all').forEach(c=>{if(!g[c.id])return;h+=`<section class="ms">`;if(f==='all')h+=`<div class="sl">${T(c)}</div>`;h+=`<div class="mg">`;
  g[c.id].forEach(i=>{const d=T(i),s=L==='ar'?i.en.name:i.ar.name,u=L==='ar'?'ر.س':'SAR',p=i.pl?T(i.pl)+' ':'';

sh.addEventListener('touchstart',e=>{sy=e.touches[0].clientY},{passive:true});

const IMGBB_KEY = ''; // Set your ImgBB API key here
function openAP(){document.getElementById('apx').classList.add('on');document.body.style.overflow='hidden';rAP()}
function closeAP(){document.getElementById('apx').classList.remove('on');document.body.style.overflow=''}
function showCfm(t,m,cb){document.getElementById('cfmT').textContent=t;document.getElementById('cfmM').textContent=m;document.getElementById('cfmY').onclick=()=>{cb();closeCfm()};document.getElementById('cfmBg').classList.add('on')}
function closeCfm(){document.getElementById('cfmBg').classList.remove('on')}

let adminTab='items';
function switchATab(t){adminTab=t;document.querySelectorAll('.atab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.querySelectorAll('.asec').forEach(s=>s.classList.toggle('on',s.dataset.t===t))}

async function loadAll(){
  try{const r=await fetch(API+'/all',{headers:{'x-pin':PIN}});if(!r.ok)throw 0;return await r.json()}catch(e){PIN=null;rAP();return null}}

async function saveAll(d){
  await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json','x-pin':PIN},body:JSON.stringify(d)});
  await load()}

function rAP(){
  const el=document.getElementById('apc');
  if(!PIN){el.innerHTML=`<div class="aph"><div class="apt">🔐 إدارة المنيو</div><button class="apclose" onclick="closeAP()">✕</button></div><div class="aplogin"><div style="color:var(--sg);font-size:14px;margin-bottom:20px">ادخل PIN المالك</div><input type="password" id="pini" maxlength="6" inputmode="numeric" placeholder="••••••"><button onclick="doPin()">دخول</button><div class="aperr" id="perr"></div></div>`;setTimeout(()=>{const i=document.getElementById('pini');if(i)i.focus()},100);return}
  loadAll().then(d=>{if(!d)return;raw=d.items||[];
  let h=`<div class="aph"><div class="apt">📋 لوحة التحكم</div><button class="apclose" onclick="closeAP()">✕</button></div>`;
  // Tabs
  h+=`<div class="atabs"><button class="atab ${adminTab==='items'?'on':''}" data-t="items" onclick="switchATab('items')">الأصناف (${raw.length})</button><button class="atab ${adminTab==='cats'?'on':''}" data-t="cats" onclick="switchATab('cats')">المجموعات</button></div>`;

  // ═══ ITEMS TAB ═══
  h+=`<div class="asec ${adminTab==='items'?'on':''}" data-t="items">`;
  raw.forEach((it,i)=>{const av=it.available!==false;const hid24=it.hiddenUntil&&Date.now()<it.hiddenUntil;
  h+=`<div class="apc${!av?' hid':''}"><div class="apc-h"><img class="apc-img" src="${it.image||''}" alt="" onerror="this.style.display='none'"><div style="flex:1;min-width:0"><span class="av ${av?'y':'n'}">${av?'ظاهر':hid24?'مخفي 24س':'مخفي'}</span><div class="apc-n">${it.name.ar}</div><div class="apc-en">${it.name.en}</div></div><div class="apc-p">${it.price} ر.س</div></div>${hid24?`<div class="ahid-info">⏰ يرجع تلقائي: ${new Date(it.hiddenUntil).toLocaleString('ar-SA',{hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'})}</div>`:''}
  <div class="apc-f"><button class="apb apb-e" onclick="eItem(${i})">✏️ تعديل</button>${av?`<button class="apb apb-h" onclick="hide24(${i})">🕐 إخفاء 24 ساعة</button>`:`<button class="apb apb-s" onclick="tgAv(${i},true)">👁 إظهار</button>`}<button class="apb apb-d" onclick="delItem(${i})">🗑 حذف</button></div></div>`});
  h+=`<button class="apb-add" onclick="eItem(-1)">+ إضافة صنف جديد</button></div>`;

  // ═══ CATEGORIES TAB ═══
  h+=`<div class="asec ${adminTab==='cats'?'on':''}" data-t="cats">`;
  h+=`<div class="cat-add-row"><input type="text" id="newCatAr" placeholder="اسم المجموعة عربي"><input type="text" id="newCatEn" placeholder="English name"><button onclick="addCat()">إضافة</button></div>`;
  const dCats=(d.categories||[]);
  dCats.forEach((c,ci)=>{
    const cnt=raw.filter(x=>x.category===c.id).length;
    h+=`<div class="catc"><div><div class="catc-n">${c.ar} / ${c.en}</div><div class="catc-ct">${cnt} صنف</div></div><div class="catc-a"><button class="catc-ren" onclick="renCat(${ci})">✏️</button><button class="catc-del" onclick="delCat('${c.id}',${cnt})">🗑</button></div></div>`;
  });
  h+=`</div>`;

  el.innerHTML=h})}

async function doPin(){const p=document.getElementById('pini').value;try{const r=await fetch(API+'/all',{headers:{'x-pin':p}});if(!r.ok)throw 0;PIN=p;rAP()}catch(e){document.getElementById('perr').textContent='PIN غلط'}}

// ═══ HIDE 24 HOURS ═══
async function hide24(i){
  const d=await loadAll();if(!d)return;
  d.items[i].available=false;
  d.items[i].hiddenUntil=Date.now()+24*60*60*1000;
  await saveAll(d);rAP()}

async function tgAv(i,v){const d=await loadAll();if(!d)return;d.items[i].available=v;d.items[i].hiddenUntil=null;await saveAll(d);rAP()}

// ═══ DELETE PERMANENTLY ═══
function delItem(i){
  const name=raw[i]?raw[i].name.ar:'';
  showCfm('🗑 حذف نهائي',`"${name}" — لا يمكن التراجع. متأكد؟`,async()=>{
    const d=await loadAll();if(!d)return;
    d.items.splice(i,1);
    await saveAll(d);rAP()})}

// ═══ ADD CATEGORY ═══
async function addCat(){
  const ar=document.getElementById('newCatAr').value.trim();
  const en=document.getElementById('newCatEn').value.trim();
  if(!ar||!en)return;
  const d=await loadAll();if(!d)return;
  if(!d.categories)d.categories=[];
  d.categories.push({id:'cat_'+Date.now(),ar,en});
  await saveAll(d);rAP()}

async function renCat(ci){
  const d=await loadAll();if(!d)return;
  const c=d.categories[ci];if(!c)return;
  const ar=prompt('الاسم عربي:',c.ar);if(!ar)return;
  const en=prompt('English name:',c.en);if(!en)return;
  c.ar=ar.trim();c.en=en.trim();
  await saveAll(d);rAP()}

function delCat(id,cnt){
  showCfm('🗑 حذف المجموعة',cnt>0?`فيها ${cnt} صنف — بتنحذف معها. متأكد؟`:'المجموعة فارغة. متأكد؟',async()=>{
    const d=await loadAll();if(!d)return;
    d.categories=d.categories.filter(c=>c.id!==id);
    d.items=d.items.filter(x=>x.category!==id);
    await saveAll(d);rAP()})}

// ═══ AUTO-UNHIDE (check on load) ═══
async function checkHidden(){
  const d=await loadAll();if(!d)return;
  let changed=false;
  d.items.forEach(it=>{
    if(!it.available&&it.hiddenUntil&&Date.now()>=it.hiddenUntil){
      it.available=true;it.hiddenUntil=null;changed=true}});
  if(changed)await saveAll(d)}

// ═══ ImgBB UPLOAD ═══
async function uploadImg(file,cb){
  if(!IMGBB_KEY){
    alert('⚠️ مفتاح ImgBB غير موجود — حط IMGBB_KEY بالكود');
    cb('');return}
  // Compress image before upload
  const compressed = await compressImg(file, 1200, 0.8);
  const form=new FormData();form.append('image',compressed);form.append('key',IMGBB_KEY);
  try{
    const res=await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:form});
    const j=await res.json();
    if(j.success){cb(j.data.display_url)}
    else{console.error('ImgBB error:',j);alert('خطأ في رفع الصورة: '+(j.error?.message||'unknown'));cb('')}
  }catch(e){console.error('Upload failed:',e);alert('فشل الاتصال بـ ImgBB');cb('')}}

function compressImg(file, maxW, quality){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>maxW){h=h*(maxW/w);w=maxW}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>resolve(b||file),'image/jpeg',quality);
    };
    img.onerror=()=>resolve(file);
    img.src=URL.createObjectURL(file);
  })}

function handleImgFile(inp){
  const f=inp.files?.[0];if(!f)return;
  const wrap=inp.closest('.img-up');
  const img=wrap.querySelector('img');
  const ph=wrap.querySelector('.iph');
  const uping=wrap.querySelector('.uping');
  // Preview immediately
  const r=new FileReader();r.onload=e=>{img.src=e.target.result;img.classList.add('on');if(ph)ph.style.display='none';wrap.classList.add('has')};r.readAsDataURL(f);
  // Upload
  if(uping)uping.classList.add('on');
  uploadImg(f,url=>{
    document.getElementById('eimg').value=url;
    if(uping)uping.classList.remove('on')})}

  <div class="er"><div class="el">المكونات عربي (فاصلة)</div><input class="ei" id="eia" value="${(it.ingredients.ar||[]).join('، ')}"></div>

function closeE(){document.getElementById('emx').classList.remove('on')}

async function saveE(){
  const d=await loadAll();if(!d)return;
  const pl=document.getElementById('epl').value.trim();
  const als=Array.from(document.querySelectorAll('.ealb.on')).map(b=>b.dataset.a);

    name:{ar:document.getElementById('na').value.trim(),en:document.getElementById('ne').value.trim()},

    macros:{cal:+document.getElementById('ecal').value||0,protein:+document.getElementById('epro').value||0,carbs:+document.getElementById('ecrb').value||0,fat:+document.getElementById('efat').value||0},
    available:eIdx>=0?(raw[eIdx].available!==false):true,order:eIdx>=0?(raw[eIdx].order||eIdx+1):d.items.length+1};
  if(eIdx>=0)d.items[eIdx]=it;else d.items.push(it);

setTimeout(()=>{if(PIN)checkHidden()},2000);
